version: v1.0

plan: standard-2

paths:
  - app/**
  - bin/**
  - config/**
  - db/**
  - lib/**
  - test/**
  - .neetoci/default.yml
  - .neetoci/scripts/run_eslint_on_modified_files.sh
  - .neetoci/scripts/run_rubocop_and_erblint_on_modified_files.sh
  - .neetoci/scripts/check_schema_drift.sh
  - Gemfile*
  - package.json
  - yarn.lock
  - Rakefile
  - .env.test
  - config.ru
  - .*.yml
  - .ruby-version
  - .node-version
  - .nvmrc
  - .active_record_doctor.rb
  - .prettierrc.js
  - "*.config.*"
  - .eslintignore
  - .eslintrc.js

commands:
  - checkout
  - neetoci-version ruby 3.3.5
  - bundle config path 'vendor/bundle'
  - cache restore
  - bundle install --jobs 1
  - cache store
  - bundle exec rubocop
  - bundle exec rake test
  - bundle exec rspec

triggers:
  - event: branch
    branch_name: main
  - event: pull_request
