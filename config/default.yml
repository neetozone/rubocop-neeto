Neeto/UnsafeTableDeletion:
  Description: >-
    `drop_table` is considered as a dangerous operation. If not used correctly,
    it could cause irreversible data loss. It is advised to rename the table
    to `table_name_deprecated_on_yyyy_mm_dd` instead. The renamed table can be
    safely dropped in a later migration. The cop permits dropping tables
    that are named in the above format.
  Enabled: true
  Severity: refactor
  VersionAdded: '0.1'
  Include:
    - db/**/*.rb

Neeto/UnsafeColumnDeletion:
  Description: >-
    `remove_column` is considered as a dangerous operation. If not used
    correctly, it could cause irreversible data loss. It is advised to rename
    the column to `column_name_deprecated_on_yyyy_mm_dd` instead. The renamed
    column can be safely removed in a later migration. The cop permits
    removing columns that are named in the above format.
  Enabled: true
  Severity: refactor
  VersionAdded: '0.1'
  Include:
    - db/**/*.rb

Neeto/DirectEnvAccess:
  Description: >-
    Rails had `secrets.yml` which provided a single source of truth for all
    environment variables and their fallback values. Rails deprecated this in
    favor of encrypted credentials, so we created Secvault to maintain
    centralized configuration. Direct usage of `ENV` bypasses this system,
    making it harder to track what environment variables are being used and
    their defaults. Use `Secvault.secrets` instead.
  Enabled: true
  Severity: refactor
  VersionAdded: '0.1'
  Include:
    - app/**/*.rb

Neeto/DeprecatedJobBaseClass:
  Description: >-
    Jobs should not inherit directly from the legacy
    `NeetoCommonsBackend::BaseJobs::*` base classes. Use latency-based job
    classes such as `LatencyBasedJobs::Within5Seconds`,
    `LatencyBasedJobs::Within1Minute`, `LatencyBasedJobs::Within5Minutes`,
    or `LatencyBasedJobs::Within1Hour` instead.
  Enabled: true
  Severity: refactor
  VersionAdded: '0.1'
  Include:
    - app/jobs/**/*.rb
    - app/workers/**/*.rb
    - test/dummy/app/jobs/**/*.rb
    - test/dummy/app/workers/**/*.rb
